name: Arena

# Runs the full agent-firewall arena — including live competitor adapters —
# on every PR that touches the arena, and on demand. This is what makes the
# scoreboard reproducible: anyone can re-run the numbers by re-running this
# workflow, on a neutral host neither tool's author controls.
#
# Competitors run live, pinned:
#   - Pipelock — downloaded as a pinned release artifact, verified against a
#     hardcoded sha256 before it runs.
#   - AEGIS — built from a pinned git commit (no published image) and started
#     as its documented docker/gateway container.

on:
  pull_request:
    paths:
      - 'arena/**'
      - 'src/**'
      - '.github/workflows/arena.yml'
  workflow_dispatch: {}

permissions:
  contents: read

env:
  PIPELOCK_VERSION: 3.0.0
  PIPELOCK_SHA256: 3a9ceb11ab42f5a65bf0c440f01f5ee44e073663dd6a757d720c4a566b85c120
  # AEGIS v0.2.0 (2026-06-29) — pinned by commit, verified after checkout.
  AEGIS_COMMIT: 5f012d58111df8774e27b7f7c0bbb61fb2f9574f
  # mcp-firewall v0.1.0 (2026-02-19) — pinned by commit, pip-installed from git.
  MCP_FIREWALL_COMMIT: 5f01d8b66480cdc2b7c7a6850e239e4d0f65df07

jobs:
  arena:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Install mcp-firewall (pinned commit)
        run: |
          set -euo pipefail
          python -m pip install --quiet "mcp-firewall @ git+https://github.com/ressl/mcp-firewall.git@${MCP_FIREWALL_COMMIT}"
          python -c "import mcp_firewall; print('mcp-firewall importable')"

      - name: Download pipelock (pinned) + verify sha256
        run: |
          set -euo pipefail
          curl -sSL -o "pipelock_${PIPELOCK_VERSION}_linux_amd64.tar.gz" \
            "https://github.com/luckyPipewrench/pipelock/releases/download/v${PIPELOCK_VERSION}/pipelock_${PIPELOCK_VERSION}_linux_amd64.tar.gz"
          echo "${PIPELOCK_SHA256}  pipelock_${PIPELOCK_VERSION}_linux_amd64.tar.gz" | sha256sum -c -
          mkdir -p /tmp/pipelock-dist
          tar -xzf "pipelock_${PIPELOCK_VERSION}_linux_amd64.tar.gz" -C /tmp/pipelock-dist
          PL_BIN=$(find /tmp/pipelock-dist -type f -name pipelock | head -n1)
          test -n "$PL_BIN"
          chmod +x "$PL_BIN"
          echo "PL_BIN=$PL_BIN" >> "$GITHUB_ENV"
          "$PL_BIN" --version || true

      - name: Start pipelock scan API
        run: |
          set -euo pipefail
          nohup "$PL_BIN" run --config arena/adapters/pipelock.arena.yaml > /tmp/pipelock.log 2>&1 &
          echo "waiting for scan API…"
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://127.0.0.1:9090/api/v1/scan \
              -H 'Authorization: Bearer arena-token' -H 'Content-Type: application/json' \
              -d '{"kind":"tool_call","input":{"tool_name":"healthcheck"}}' || true)
            if [ "$code" = "200" ]; then echo "scan API up"; exit 0; fi
            sleep 1
          done
          echo "scan API never came up; daemon log:"; cat /tmp/pipelock.log; exit 1

      - name: Build + start AEGIS gateway (pinned commit)
        run: |
          set -euo pipefail
          git clone --no-checkout https://github.com/Justin0504/Aegis.git /tmp/aegis
          git -C /tmp/aegis fetch --depth 1 origin "$AEGIS_COMMIT"
          git -C /tmp/aegis checkout "$AEGIS_COMMIT"
          got=$(git -C /tmp/aegis rev-parse HEAD)
          test "$got" = "$AEGIS_COMMIT" || { echo "AEGIS commit mismatch: $got != $AEGIS_COMMIT"; exit 1; }
          docker build -t aegis-gateway:pinned -f /tmp/aegis/docker/gateway.Dockerfile /tmp/aegis
          # DB_PATH defaults to ./agentguard.db (cwd /app, root-owned) but the
          # image runs as USER node — point it at /data, which the Dockerfile
          # creates writable, or the gateway crashes on first write.
          docker run -d --name aegis -p 8080:8080 -e DB_PATH=/data/agentguard.db aegis-gateway:pinned
          echo "waiting for AEGIS gateway…"
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/health || true)
            if [ "$code" = "200" ]; then echo "AEGIS up"; exit 0; fi
            sleep 2
          done
          echo "AEGIS never came up; container log:"; docker logs aegis || true; exit 1

      - name: Run arena (default corpus)
        run: node arena/run.mjs

      - name: Run arena (external MITRE ATT&CK corpus)
        run: node arena/run.mjs --corpus external-corpus.json

      - name: Assert competitors were actually scored
        run: |
          set -euo pipefail
          node -e "
            for (const f of ['arena/results.json', 'arena/external-corpus-results.json']) {
              const rs = require('./' + f).results;
              for (const id of ['pipelock', 'aegis', 'mcp-firewall']) {
                const p = rs.find((r) => r.id === id);
                if (!p || !p.available) {
                  console.error(f + ': ' + id + ' missing or unavailable — ' + JSON.stringify(p && p.reason));
                  process.exit(1);
                }
                if (p.errored > 5) {
                  console.error(f + ': ' + id + ' errored on ' + p.errored + ' samples');
                  process.exit(1);
                }
              }
            }
            console.log('pipelock + aegis + mcp-firewall scored on both corpora');
          "

      - name: Dump AEGIS log
        if: always()
        run: docker logs aegis > /tmp/aegis.log 2>&1 || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: arena-results
          path: |
            arena/RESULTS.md
            arena/results.json
            arena/EXTERNAL-CORPUS-RESULTS.md
            arena/external-corpus-results.json
            /tmp/pipelock.log
            /tmp/aegis.log
