name: NPM_TOKEN health

# Daily check that the NPM_TOKEN secret still authenticates against the
# npm registry. Opens a GitHub issue if `npm whoami` fails — catches
# token rot, revocation, or scope changes BEFORE the next release fires
# and silently leaves npm behind.
#
# Same pattern shipped on @askalf/agent + @askalf/hands + @askalf/claude-sync.
# auto-release.yml uses a one-axis gate (HEAD vs HEAD^1 version diff) that
# CANNOT detect "npm is behind the latest release" — so a stranded release
# would be invisible until a real user reported the missing version. This
# watcher surfaces the underlying cause (a dead token) first.
#
# Triggers:
#  - daily at 04:17 UTC (off-peak, offset minute to avoid stacking)
#  - workflow_dispatch for manual verification right after rotating

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  whoami:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Check NPM_TOKEN
        id: check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set +e
          whoami_out=$(npm whoami --registry=https://registry.npmjs.org 2>&1)
          whoami_exit=$?
          set -e
          echo "exit=$whoami_exit" >> "$GITHUB_OUTPUT"
          echo "$whoami_out" > whoami.txt
          if [ "$whoami_exit" = "0" ]; then
            echo "NPM_TOKEN healthy. whoami: $whoami_out"
          else
            echo "::error::NPM_TOKEN authentication failed (exit $whoami_exit)"
            echo "--- whoami output ---"
            cat whoami.txt
          fi

      - name: Open issue on token failure
        if: steps.check.outputs.exit != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          marker='<!-- warden-npm-token-rot -->'
          existing=$(gh issue list -R "${{ github.repository }}" --state open --search "in:body $marker" --json number --jq '.[0].number // ""')
          if [ -n "$existing" ]; then
            echo "Existing open token-rot issue #$existing — leaving alone."
            exit 0
          fi

          body_file=$(mktemp)
          {
            echo "$marker"
            echo ""
            echo "### NPM_TOKEN authentication failed"
            echo ""
            echo "Daily \`npm whoami\` check could not authenticate to the npm registry. The token is likely expired, revoked, or has had its scopes changed."
            echo ""
            echo "**Impact:** the next \`@askalf/warden\` release will fail at npm publish. \`auto-release.yml\` uses a one-axis gate (HEAD vs HEAD^1 version diff) which cannot detect 'npm is behind the latest release' — a stranded release will NOT auto-recover on later merges. Manual dispatch of \`auto-release.yml\` is required after the secret is fixed."
            echo ""
            echo "### To fix"
            echo ""
            echo "1. npmjs.com -> Access Tokens -> **Generate New Token** -> **Granular Access Token**"
            echo "2. Scope: \`@askalf/*\` (or just \`@askalf/warden\`) with **Read and write** permission"
            echo "3. Copy the token (\`npm_xxxxx...\`)"
            echo "4. \`gh secret set NPM_TOKEN -R askalf/warden\` (paste when prompted)"
            echo "5. Verify token: \`gh workflow run npm-token-health.yml -R askalf/warden\` — this issue auto-closes when the next health check passes"
            echo "6. Backfill any stranded release: \`gh workflow run auto-release.yml -R askalf/warden --ref master\` — a manual dispatch ignores the version-diff gate and lands a COMPLETE release (npm publish + git tag + GitHub release) for whatever's in package.json on master, idempotently. (\`publish.yml\` only does npm — no tag/release.)"
            echo ""
            echo "### whoami output"
            echo ""
            echo "\`\`\`"
            cat whoami.txt
            echo "\`\`\`"
            echo ""
            echo "### Workflow run"
            echo ""
            echo "[Run #${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } > "$body_file"

          gh issue create \
            -R "${{ github.repository }}" \
            --title "NPM_TOKEN auth failed — token rot detected" \
            --body-file "$body_file" \
            --label "npm-token-rot"

      - name: Auto-close any open token-rot issue on success
        if: steps.check.outputs.exit == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          marker='<!-- warden-npm-token-rot -->'
          open_issues=$(gh issue list -R "${{ github.repository }}" --state open --search "in:body $marker" --json number --jq '.[].number')
          for n in $open_issues; do
            gh issue close "$n" -R "${{ github.repository }}" --comment "Auto-closed: \`npm whoami\` succeeded on [run #${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}). Token healthy again."
          done
