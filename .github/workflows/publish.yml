name: Publish to npm

# npm-ONLY publisher, and the ONLY workflow that can publish via OIDC trusted
# publishing: the npmjs.com trusted publisher is bound to this exact filename
# (publish.yml), so no other workflow can authenticate this way.
#
# Two ways this runs:
#  - auto-release.yml dispatches it right after tagging + creating the GitHub
#    release (a GITHUB_TOKEN-created workflow_dispatch DOES start a run — it's
#    one of the two documented exceptions to the no-recursive-workflows rule).
#  - Manual dispatch as the recovery lever for a stranded release (git/GitHub
#    ahead of npm). Bump + release first (auto-release.yml), then dispatch
#    this to push that version to npm.
#
# Idempotent: if npm already has package.json's version, the run exits green
# without publishing — safe to re-dispatch any time.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # Trusted publishing (OIDC) needs npm >=11.5.1; Node 24 bundles npm 11.
          # Runtime floor stays engines.node >=20 — ci.yml tests 20/22.
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Skip if npm already has this version
        id: gate
        run: |
          set -euo pipefail
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          published=$(npm view "${name}@${version}" version 2>/dev/null || echo "")
          if [ "$published" = "$version" ]; then
            echo "npm already has ${name}@${version}; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # The npm CLI silently falls back to setup-node's placeholder token when
      # the OIDC exchange fails, so a missing or mis-bound trusted publisher
      # surfaces as the same cryptic E403 as every other rejection. Probe the
      # exchange explicitly so a binding problem fails loud with the registry's
      # actual error. On success the response (which contains a short-lived
      # token) is discarded unread — npm publish performs its own exchange.
      - name: Verify trusted-publisher binding (OIDC exchange preflight)
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -euo pipefail
          curl -sSf -o id-token.json \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org"
          idtok=$(node -p "JSON.parse(require('fs').readFileSync('id-token.json','utf8')).value")
          name=$(node -p "require('./package.json').name")
          code=$(curl -sS -o exchange-response.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${idtok}" \
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/${name/\//%2f}")
          rm -f id-token.json
          # The exchange returns 201 Created on success (a fresh short-lived
          # token IS created) — accept any 2xx, not just 200. The success-path
          # response is deleted unread; it contains that token.
          case "$code" in
            2*)
              echo "Trusted-publisher binding OK (exchange HTTP ${code})."
              rm -f exchange-response.json
              ;;
            *)
              echo "::error::OIDC token exchange for ${name} failed: HTTP ${code}"
              cat exchange-response.json; echo ""
              echo "Check npmjs.com -> ${name} -> Settings -> Trusted Publisher:"
              echo "  repository ${GITHUB_REPOSITORY}, workflow filename publish.yml (bare filename, no path), environment EMPTY."
              exit 1
              ;;
          esac

      - run: npm ci
        if: steps.gate.outputs.skip != 'true'
      - run: npm test
        if: steps.gate.outputs.skip != 'true'
      # Auth = OIDC via the npmjs.com trusted publisher bound to THIS workflow
      # filename (publish.yml) — no NPM_TOKEN. Provenance is automatic under OIDC.
      - run: npm publish --access public
        if: steps.gate.outputs.skip != 'true'
