name: Publish to npm

# npm-ONLY emergency publisher. The PRIMARY release path is auto-release.yml,
# which fires on a package.json version bump (or manual dispatch) and handles
# tag + GitHub release + npm publish.
#
# PREFER `gh workflow run auto-release.yml --ref master` for recovery / first
# publish: a manual dispatch there lands a COMPLETE release (npm + tag +
# GitHub release), idempotently. Use THIS workflow only when you deliberately
# want to push to npm WITHOUT creating a tag or release — it leaves git/npm
# out of sync, which is what stranded the original 0.2.0 release.
#
# Dispatch-only on purpose. A `release: published` trigger here would
# double-fire against auto-release.yml (which CREATES the release), and the
# second `npm publish` would fail "cannot publish over existing version".

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
