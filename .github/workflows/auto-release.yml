name: Auto-release

# Triggered when package.json's "version" field changes on master.
# Tags vX.Y.Z, creates a GitHub release from the matching CHANGELOG
# section, then dispatches publish.yml to push the version to npm.
#
# npm auth lives ONLY in publish.yml: the npmjs.com trusted publisher (OIDC)
# is bound to that exact filename, so this workflow cannot publish directly —
# and doesn't need a token to try. The GITHUB_TOKEN-created workflow_dispatch
# below DOES start a run (one of the two documented exceptions to the
# no-recursive-workflows rule).
#
# Idempotent — if the tag already exists the job exits cleanly without
# republishing, and publish.yml itself skips versions npm already has.
# Manual re-runs via workflow_dispatch are safe.
#
# A manual workflow_dispatch BYPASSES the version-diff gate (which only makes
# sense for push events) and releases whatever version is in package.json,
# guarded solely by the "tag already exists" check. This makes dispatch the
# COMPLETE recovery lever: one run tags + creates the GitHub release +
# dispatches the npm publish.

on:
  push:
    branches: [master]
    paths:
      - package.json
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push tag + create GitHub release
      actions: write # dispatch publish.yml (the OIDC npm publisher)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Read version from package.json
        id: version
        run: |
          set -euo pipefail
          v=$(node -p "require('./package.json').version")
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "tag=v${v}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${v}"

      - name: Skip if tag already exists
        id: gate
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if version field didn't change in this push
        id: bumped
        # Push-only: a manual workflow_dispatch intentionally skips this step, so
        # steps.bumped.outputs.skip stays empty ('' != 'true') and the downstream
        # release steps run — gated solely by the "tag already exists" check.
        if: steps.gate.outputs.skip != 'true' && github.event_name == 'push'
        env:
          NEW: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          old=$(git show "HEAD~1:package.json" 2>/dev/null | node -e "
            let s = ''; process.stdin.on('data', d => s += d).on('end', () => {
              try { console.log(JSON.parse(s).version); } catch { console.log(''); }
            });
          " || echo "")
          echo "old=${old}"
          echo "new=${NEW}"
          if [ "$old" = "$NEW" ]; then
            echo "Version unchanged ($old -> $NEW); skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version bumped: $old -> $NEW"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install + test
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        run: |
          set -euo pipefail
          npm ci
          npm test

      - name: Extract release notes from CHANGELOG
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        # indexOf, not a regex: the old multiline regex's $ matched the blank
        # line right after the version heading, so the lazy capture came back
        # empty and every release shipped the "Release vX.Y.Z" fallback body
        # (v0.2.1 and v0.3.0 both did; their notes were backfilled by hand).
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const md = fs.existsSync('CHANGELOG.md') ? fs.readFileSync('CHANGELOG.md', 'utf-8') : '';
            const heading = '## [' + process.env.VERSION + ']';
            const at = md.indexOf(heading);
            let body = '';
            if (at !== -1) {
              const eol = md.indexOf('\n', at);
              const rest = eol === -1 ? '' : md.slice(eol + 1);
              const next = rest.indexOf('\n## [');
              body = (next === -1 ? rest : rest.slice(0, next)).trim();
            }
            fs.writeFileSync('release-notes.md', body || ('Release v' + process.env.VERSION));
          "
          echo "notes_path=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create annotated tag
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name 'askalf'
          git config user.email 'support@askalf.org'
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md

      - name: Dispatch npm publish (OIDC via publish.yml)
        if: steps.gate.outputs.skip != 'true' && steps.bumped.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run publish.yml -R "${{ github.repository }}" --ref master
