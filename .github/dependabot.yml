version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # one PR per run — split bumps of codeql-action/init vs /analyze create a
    # version mismatch that fails the CodeQL workflow
    groups:
      actions:
        patterns:
          - "*"
